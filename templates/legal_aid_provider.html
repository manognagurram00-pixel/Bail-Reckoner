<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Details Form</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="undertrial_prisoner.css">
</head>
<body>
    <header>
        <h1>Case Details Form</h1>
        <p>Enter all case details below to manage prisoner information effectively.</p>
    </header>
    <main>
        <form id="case-details-form">
            <section>
                <h2>Basic Case Information</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="prisoner-id">Prisoner ID</label>
                        <div class="input-container">
                            <input type="text" id="prisoner-id" name="prisoner_id" placeholder="Enter prisoner ID" required>
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="case-number">Case Number</label>
                        <div class="input-container">
                            <input type="text" id="case-number" name="case_number" placeholder="Enter case number (e.g., C12345/2024)" required>
                            <i class="fas fa-folder"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="arrest-conditions">Arrest Conditions</label>
                        <div class="input-container">
                            <textarea id="arrest-conditions" name="arrest_conditions" rows="3" placeholder="Describe arrest conditions" required></textarea>
                            <i class="fas fa-shield-alt"></i>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h2>Offense and Legal Details</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="aadhar-number">Aadhar Number</label>
                        <div class="input-container">
                            <input type="text" id="aadhar-number" name="aadhar_number" placeholder="Enter 12-digit Aadhar Number" required>
                            <i class="fas fa-id-card"></i>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="charges">Charges</label>
                        <div class="input-container">
                            <textarea id="charges" name="charges" rows="3" placeholder="Enter charges (e.g., IPC_302, IPC_307)" required></textarea>
                            <i class="fas fa-balance-scale"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="offense-date">Offense Date</label>
                        <div class="input-container">
                            <input type="date" id="offense-date" name="offense_date" required>
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="arrest-date">Arrest Date</label>
                        <div class="input-container">
                            <input type="date" id="arrest-date" name="arrest_date" required>
                            <i class="fas fa-calendar"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="bail-status">Bail Status</label>
                        <div class="input-container">
                            <select id="bail-status" name="bail_status" required>
                                <option value="">Select bail status</option>
                                <option value="bailable">Bailable</option>
                                <option value="non-bailable">Non-Bailable</option>
                                <option value="bail-granted">Bail Granted</option>
                                <option value="bail-rejected">Bail Rejected</option>
                            </select>
                            <i class="fas fa-stamp"></i>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h2>Case Status and Additional Information</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="case-status">Case Status</label>
                        <div class="input-container">
                            <select id="case-status" name="case_status" required>
                                <option value="">Select case status</option>
                                <option value="ongoing">Ongoing</option>
                                <option value="resolved">Resolved</option>
                                <option value="appeal">Appeal</option>
                            </select>
                            <i class="fas fa-info-circle"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="court-hearing-date">Court Hearing Date</label>
                        <div class="input-container">
                            <input type="date" id="court-hearing-date" name="court_hearing_date" required>
                            <i class="fas fa-gavel"></i>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="legal-aid-provider-id">Legal Aid Provider ID (Optional)</label>
                        <div class="input-container">
                            <input type="text" id="legal-aid-provider-id" name="legal_aid_provider_id" placeholder="Enter legal aid provider ID (if any)">
                            <i class="fas fa-id-card-alt"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="case-summary">Case Summary</label>
                        <div class="input-container">
                            <textarea id="case-summary" name="case_summary" rows="5" placeholder="Provide a brief case summary"></textarea>
                            <i class="fas fa-file-alt"></i>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="evidence-details">Evidence Details</label>
                        <div class="input-container">
                            <textarea id="evidence-details" name="evidence_details" rows="3" placeholder="Describe evidence (e.g., CCTV footage, fingerprints)"></textarea>
                            <i class="fas fa-evidence"></i>
                        </div>
                    </div>
                </div>
            </section>

            <section class="submit-section">
                <button type="button" id="add-ongoing-case-button">Add to Ongoing Cases
                    <i class="fas fa-info-circle info-icon" title="Click for information"></i>
                </button>
                <button type="button" id="get-bail-status-button">Get Bail Status</button>
                <button type="reset">Reset Form</button>
            </section>
            <button type="button" id="back-button" onclick="location.href='home.html';">Back to Home</button>

            <section id="response-section" class="response">
                <h2>Bail Status Response</h2>
                <pre id="response-output">Awaiting response...</pre>
            </section>
        </form>
    </main>
    <script>
        document.querySelector('.info-icon').addEventListener('click', () => {
            alert("Adding to ongoing cases allows judicial authorities to provide suggestions, and legal aid providers to take up your cases. Once added, these stakeholders can view your case details.");
        });

        document.getElementById("add-ongoing-case-button").addEventListener("click", async () => {
            const caseDetails = {
                prisoner_id: document.getElementById("prisoner-id").value,
                case_number: document.getElementById("case-number").value,
                arrest_conditions: document.getElementById("arrest-conditions").value,
                aadhar_number: document.getElementById("aadhar-number").value,
                charges: document.getElementById("charges").value,
                offense_date: document.getElementById("offense-date").value,
                arrest_date: document.getElementById("arrest-date").value,
                bail_status: document.getElementById("bail-status").value,
                case_status: document.getElementById("case-status").value,
                court_hearing_date: document.getElementById("court-hearing-date").value,
                legal_aid_provider_id: document.getElementById("legal-aid-provider-id").value || null,
                case_summary: document.getElementById("case-summary").value || null,
                evidence_details: document.getElementById("evidence-details").value || null,
                legal_aid_provider: null,
                suggestions: null,
                prisoner_lawyer: null,
            };

            try {
                const response = await fetch("http://127.0.0.1:8000/add-ongoing-case", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(caseDetails),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    alert(`Error: ${errorText || "Unknown error occurred"}`);
                    return;
                }

                const result = await response.json();
                alert(result.message);
                window.location.href = 'home.html';
            } catch (error) {
                alert("An unexpected error occurred: " + error.message);
                console.error(error);
            }
        });

        document.getElementById("get-bail-status-button").addEventListener("click", async () => {
            const charges = document.getElementById("charges").value.trim();
        
            if (!charges) {
                alert("Please enter charges to check the bail status.");
                return;
            }
        
            try {
                const response = await fetch("http://127.0.0.1:8000/get-bail-status", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ charges }),
                });
        
                const result = await response.json();
                if (response.ok) {
                    // Format and display the detailed response with line breaks
                    const formattedResponse = `
                        <strong>Section:</strong> ${result.section || 'N/A'}<br>
                        <strong>Offense Type:</strong> ${result.offense_type || 'N/A'}<br>
                        <strong>Bail Status:</strong> ${result.bail_status || 'No'}<br>
                        <strong>Bail Eligibility:</strong> ${result.bail_eligibility || 'Not Applicable'}<br>
                        <strong>Details:</strong> ${result.details.replace(/\n/g, '<br>')}
                    `;
                    document.getElementById("response-output").innerHTML = formattedResponse;
                } else {
                    alert(result.error || "An error occurred.");
                }
            } catch (error) {
                alert("An unexpected error occurred: " + error.message);
                console.error(error);
            }
        });
    </script>
</body>
</html>
